name: CI
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/wasm-component-ci.yml@main
    with:
      wasm-build-args: "--target wasm32-wasip2"
      validate-component: false
